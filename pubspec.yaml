name: dhibic_dahab
description: Dhibic Dahab Store application
publish_to: 'none'

version: 1.0.5+8

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔥 NETWORK + FORMAT
  http: ^1.2.0
  intl: ^0.19.0   # ⚠️ downgraded for stability

  # 🔥 FIREBASE (stable combo)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_database: ^11.0.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.0.4
  cloud_functions: ^5.0.4

  # 🔔 NOTIFICATIONS
  flutter_local_notifications: ^17.1.2

  # 🔐 LOGIN + MEDIA
  google_sign_in: ^6.2.1
  image_picker: ^1.1.2

  # 📦 STORAGE + LOCAL
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # 📱 UTILITIES
  provider: ^6.1.2
  uuid: ^4.4.0

  # 📄 PDF + LINKS
  flutter_pdfview: ^1.3.2
  url_launcher: ^6.2.6

  # 📺 MEDIA
  video_player: ^2.8.7

  # 💰 ADS
  google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/delivery_bike.png
    - assets/pdfs/